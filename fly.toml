# fly.toml app configuration file generated for words-game on 2024-10-13T18:57:58-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'words-game'
# the words_data volume lives in dfw; machines must be in the volume's region
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'

# requires the one-time `fly volumes create words_data --region dfw --size 1`
[mounts]
  source = 'words_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
